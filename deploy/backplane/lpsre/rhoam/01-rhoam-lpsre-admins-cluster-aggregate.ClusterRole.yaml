apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backplane-rhoam-lpsre-admins-cluster-aggregate
  labels:
    managed.openshift.io/aggregate-to-lpsre-admins: "cluster"
rules:
# LP SRE can view projects
- apiGroups:
  - config.openshift.io
  resources:
  - projects
  verbs:
  - get
  - list
  - watch
# LP SRE can get infrastructure details (cluster)
- apiGroups:
  - config.openshift.io
  resources:
  - infrastructures
  - oauths
  verbs:
  - 'get'
# LP SRE can view namespaces / projects
- apiGroups:
  - project.openshift.io
  resources:
  - projects
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - namespaces
  - namespaces/finalize
  verbs:
  - get
  - list
  - watch
# LP SRE can view existing groups
- apiGroups:
  - user.openshift.io
  resources:
  - groups
  verbs:
  - get
# LP SRE can view the following list of apigroups
- apiGroups:
  - "apiextensions.k8s.io"
  - "applicationmonitoring.integreatly.org"
  - "apps.3scale.net"
  - "capabilities.3scale.net"
  - "keycloak.org"
  - "monitoring.coreos.com"
  resources:
  - '*'
  verbs:
  - get
  - list
  - watch
