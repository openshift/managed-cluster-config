apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backplane-rhobs-regional-cluster
rules:
- apiGroups:
  - monitoring.thanos.io
  resources:
  - thanoscompacts
  - thanosqueries
  - thanosreceives
  - thanosrulers
  - thanosstores
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - monitoring.rhobs
  resources:
  - alertmanagerconfigs
  - alertmanagers
  - monitoringstacks
  - podmonitors
  - probes
  - prometheusagents
  - prometheuses
  - prometheusrules
  - scrapeconfigs
  - servicemonitors
  - thanosqueriers
  - thanosrulers
  - uiplugins
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - monitoring.coreos.com
  resources:
  - alertmanagers
  - prometheuses
  - prometheusrules
  - thanosqueriers
  - servicemonitors
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - loki.grafana.com
  resources:
  - lokistacks
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - route.openshift.io
  resources:
  - routes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - template.openshift.io
  resources:
  - templates
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  - clusterrolebindings
  - roles
  - rolebindings
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - "" # The core API group for built-in resources
  resources:
  - configmaps
  - services
  - serviceaccounts
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  verbs:
  - get
  - list
  - watch
