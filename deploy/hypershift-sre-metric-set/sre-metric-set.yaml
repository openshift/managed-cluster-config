apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-metric-set
  namespace: hypershift
data:
  config: |
    kubeAPIServer:
      - action:       "keep"
        regex:        "apiserver_request_total.*|apiserver_request_duration_seconds_count.*|apiserver_request_duration_seconds_bucket;(1|5|\\+Inf)|apiserver_flowcontrol_rejected_requests_total.*|apiserver_flowcontrol_current_executing_requests.*|apiserver_flowcontrol_nominal_limit_seats.*"
        sourceLabels: ["__name__", "le"]
    openshiftAPIServer:
      - action:       "keep"
        regex:        "apiserver_request_total.*|apiserver_request_duration_seconds_count.*|apiserver_request_duration_seconds_bucket;(1|5|\\+Inf)"
        sourceLabels: ["__name__", "le"]
