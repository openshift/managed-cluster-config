deploymentMode: "SelectorSyncSet"
selectorSyncSet:
  resourceApplyMode: "Sync"
  matchExpressions:
  - key: hive.openshift.io/version-major-minor
    operator: In
    values: ["4.18"]
  - key: hive.openshift.io/cluster-platform
    operator: In
    values: ["aws"]
  - key: api.openshift.com/product
    operator: NotIn
    values: ["rosa"]
