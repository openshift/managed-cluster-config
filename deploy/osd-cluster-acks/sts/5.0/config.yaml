deploymentMode: SelectorSyncSet
resourceApplyMode: Sync
selectorSyncSet:
  matchExpressions:
  - key: hive.openshift.io/version-major-minor
    operator: In
    values: ["4.22"]
  - key: api.openshift.com/sts
    operator: In
    values: ["true"]
  - key: api.openshift.com/fedramp
    operator: NotIn
    values: ["true"]
