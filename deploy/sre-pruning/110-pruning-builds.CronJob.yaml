---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: builds-pruner
  namespace: openshift-sre-pruning
spec:
  failedJobsHistoryLimit: 5
  successfulJobsHistoryLimit: 3
  concurrencyPolicy: Replace
  schedule: "0 */1 * * *"
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
              - preference:
                  matchExpressions:
                  - key: node-role.kubernetes.io/infra
                    operator: Exists
                weight: 1
          tolerations:
            - effect: NoSchedule
              key: node-role.kubernetes.io/infra
              operator: Exists
          serviceAccountName: sre-pruner-sa
          restartPolicy: Never
          containers:
          - name: builds-pruner
            image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
            imagePullPolicy: Always
            command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              for ns in $(oc get namespaces -o name | grep 'namespace/openshift-' | cut -d'/' -f2); do
                echo "Pruning builds in namespace: $ns"
                oc adm prune builds \
                  --namespace="$ns" \
                  --keep-younger-than=24h \
                  --keep-complete=1 \
                  --keep-failed=1 \
                  --confirm
              done
