apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: autonode-ec2nodeclass-guardrails
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["karpenter.hypershift.openshift.io"]
        apiVersions: ["v1beta1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["openshiftec2nodeclasses"]
  validations:
    # Minimum disk size: EBS volumes must be >= 100Gi
    - expression: |
        !has(object.spec) ||
        !has(object.spec.blockDeviceMappings) ||
        object.spec.blockDeviceMappings.all(bdm,
          !has(bdm.ebs) ||
          !has(bdm.ebs.volumeSize) ||
          int(string(bdm.ebs.volumeSize).replace('Gi', '').replace('G', '')) >= 100
        )
      message: "EBS volume size must be at least 100Gi."
    # Require EBS encryption on all volumes
    - expression: |
        !has(object.spec) ||
        !has(object.spec.blockDeviceMappings) ||
        object.spec.blockDeviceMappings.all(bdm,
          !has(bdm.ebs) ||
          (has(bdm.ebs.encrypted) && bdm.ebs.encrypted == true)
        )
      message: "All EBS volumes must have encryption enabled (encrypted: true)."
    # Block reserved tags
    - expression: |
        !has(object.spec) ||
        !has(object.spec.tags) ||
        object.spec.tags.all(key,
          key != 'red-hat-managed' &&
          !key.startsWith('api.openshift.com/') &&
          !key.startsWith('kubernetes.io/cluster/')
        )
      message: "Tags 'red-hat-managed', 'api.openshift.com/*', and 'kubernetes.io/cluster/*' are reserved and cannot be set."
    # Block public IP association
    - expression: |
        !has(object.spec) ||
        !has(object.spec.associatePublicIPAddress) ||
        object.spec.associatePublicIPAddress != true
      message: "Public IP address association is not allowed. Set associatePublicIPAddress to false or remove it."
