apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: autonode-nodepool-guardrails
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["karpenter.sh"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["nodepools"]
  validations:
    # Block tiny instance types (.nano, .micro, .small, .medium)
    - expression: |
        !has(object.spec.template.spec.requirements) ||
        object.spec.template.spec.requirements
          .filter(r, r.key == 'node.kubernetes.io/instance-type' && r.operator == 'In')
          .all(r, r.values.all(v,
            !v.matches('\\.(nano|micro|small|medium)$')
          ))
      message: "Instance types ending in .nano, .micro, .small, or .medium are not allowed. Use .large or bigger."
    # Require NotIn exclusion for blocked instance sizes
    - expression: |
        !has(object.spec.template.spec.requirements) ||
        object.spec.template.spec.requirements.exists(r,
          r.key == 'karpenter.k8s.aws/instance-size' &&
          r.operator == 'NotIn' &&
          ['nano', 'micro', 'small', 'medium'].all(size, r.values.exists(v, v == size))
        )
      message: "NodePool must include a NotIn requirement for karpenter.k8s.aws/instance-size excluding nano, micro, small, and medium. Example: {key: karpenter.k8s.aws/instance-size, operator: NotIn, values: [nano, micro, small, medium]}"
    # Block reserved node-role labels
    - expression: |
        !has(object.spec.template.metadata) ||
        !has(object.spec.template.metadata.labels) ||
        !('node-role.kubernetes.io/master' in object.spec.template.metadata.labels) &&
        !('node-role.kubernetes.io/infra' in object.spec.template.metadata.labels) &&
        !('node-role.kubernetes.io/control-plane' in object.spec.template.metadata.labels)
      message: "Labels node-role.kubernetes.io/master, node-role.kubernetes.io/infra, and node-role.kubernetes.io/control-plane are reserved and cannot be set on NodePools."
