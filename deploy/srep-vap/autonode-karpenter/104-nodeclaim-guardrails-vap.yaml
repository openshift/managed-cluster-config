apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: autonode-nodeclaim-guardrails
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["karpenter.sh"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["nodeclaims"]
  validations:
    # Block tiny instance types (.nano, .micro, .small, .medium) on NodeClaims
    - expression: |
        !has(object.spec.requirements) ||
        object.spec.requirements
          .filter(r, r.key == 'node.kubernetes.io/instance-type' && r.operator == 'In')
          .all(r, r.values.all(v,
            !v.matches('\\.(nano|micro|small|medium)$')
          ))
      message: "Instance types ending in .nano, .micro, .small, or .medium are not supported for OpenShift nodes."
