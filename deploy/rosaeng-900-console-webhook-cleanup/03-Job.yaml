apiVersion: batch/v1
kind: Job
metadata:
  name: console-webhook-cleanup
  namespace: openshift-console-operator
  annotations:
    kubernetes.io/description: "ROSAENG-900: Remove console-conversion-webhook deployment from 4.17+ clusters"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 43200
  activeDeadlineSeconds: 300
  template:
    metadata:
      name: console-webhook-cleanup
    spec:
      serviceAccountName: console-webhook-cleanup-sa
      restartPolicy: Never
      containers:
      - name: cleanup
        image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
        command:
        - /bin/bash
        - -c
        - |
          #!/bin/bash
          set -euo pipefail

          DEPLOYMENT_NAME="console-conversion-webhook"
          NAMESPACE="openshift-console-operator"

          echo "=========================================="
          echo "Console Webhook Cleanup - ROSAENG-900"
          echo "=========================================="
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""

          # Check if deployment exists (explicit error handling)
          DEPLOYMENT=$(oc get deployment "${DEPLOYMENT_NAME}" -n "${NAMESPACE}" --ignore-not-found -o name 2>&1)

          if [ -n "$DEPLOYMENT" ]; then
            echo "Found deployment: ${DEPLOYMENT_NAME}"
            echo "Deleting..."

            if oc delete deployment "${DEPLOYMENT_NAME}" -n "${NAMESPACE}"; then
              echo "Deployment deleted successfully"

              # Verify deletion
              sleep 3
              VERIFY=$(oc get deployment "${DEPLOYMENT_NAME}" -n "${NAMESPACE}" --ignore-not-found -o name 2>&1)

              if [ -z "$VERIFY" ]; then
                echo "Verified: Deployment removed"
              else
                echo "ERROR: Deployment still exists after deletion"
                exit 1
              fi
            else
              echo "ERROR: Failed to delete deployment"
              exit 1
            fi
          else
            echo "Deployment not found - cluster is clean"
            echo "No action needed"
          fi

          echo ""
          echo "Cleanup completed successfully"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
