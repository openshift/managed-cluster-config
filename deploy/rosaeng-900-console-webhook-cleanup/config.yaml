deploymentMode: "SelectorSyncSet"
selectorSyncSet:
  resourceApplyMode: Sync
  matchExpressions:
  - key: hive.openshift.io/version-major-minor
    operator: In
    values:
      - "4.17"
      - "4.18"
      - "4.19"
      - "4.20"
      - "4.21"
      - "4.22"
  - key: api.openshift.com/product
    operator: In
    values:
      - "rosa"
      - "osd"
