apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    prometheus: sre-operators-deployment-alerts
    role: alert-rules
  name: sre-operators-deployment-alerts
  namespace: openshift-monitoring
spec:
  groups:
    - name: sre-operators-deployment-missing
      rules:
        # Single alert covering all SRE-managed operator deployments
        # Fires once per operator when its deployment is missing
        - alert: SREOperatorDeploymentMissingSRE
          expr: |
            # Operator namespace exists
            count by (namespace) (
              kube_namespace_labels{
                namespace=~"openshift-(route-monitor-operator|managed-upgrade-operator|ocm-agent-operator|must-gather-operator|velero|managed-node-metadata-operator)"
              }
            )
            # But expected deployment doesn't exist
            unless on (namespace)
            count by (namespace) (
              kube_deployment_status_replicas{
                namespace=~"openshift-(route-monitor-operator|managed-upgrade-operator|ocm-agent-operator|must-gather-operator|velero|managed-node-metadata-operator)",
                deployment=~"route-monitor-operator-controller-manager|managed-upgrade-operator|ocm-agent-operator|must-gather-operator|managed-velero-operator|managed-node-metadata-operator"
              }
            )
          for: 30m
          labels:
            severity: critical
            namespace: '{{ $labels.namespace }}'
            link: "https://github.com/openshift/ops-sop/blob/master/v4/alerts/SREOperatorDeploymentMissingSRE.md"
          annotations:
            summary: "SRE operator deployment missing in {{ $labels.namespace }}"
            description: "Namespace {{ $labels.namespace }} exists but its expected operator deployment is absent for 30+ minutes."
