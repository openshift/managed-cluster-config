apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    prometheus: sre-infra-resizing-alerts
    role: alert-rules
  name: sre-infra-resizing-alerts
  namespace: openshift-monitoring
spec:
  groups:
  - name: sre-infra-resource-consumption-recording.rules
    rules:
    ## Per-node CPU utilization for infra nodes.
    ## Computes the average CPU utilization (non-idle) across all cores on each infra node over the past 1h.
    ## Returns a value between 0 and 1 per infra node instance.
    - expr: |
        avg by (instance) (
          sum by (cpu, instance) (
            rate(node_cpu_seconds_total{mode!="idle"}[1h])
          )
        )
        * on (instance) (
          label_replace(
            kube_node_role{role="infra"}, "instance", "$1", "node", "(.*)"
          )
        )
      record: sre:node_infra:cpu_utilization_per_node
    ## Per-node memory utilization for infra nodes.
    ## Computes 1 - (free + buffers + cached) / total for each infra node.
    ## Returns a value between 0 and 1 per infra node instance.
    - expr: |
        (
          1 -
          (node_memory_MemFree_bytes + node_memory_Buffers_bytes + node_memory_Cached_bytes)
          / node_memory_MemTotal_bytes
        )
        * on (instance) (
          label_replace(
            kube_node_role{role="infra"}, "instance", "$1", "node", "(.*)"
          )
        )
      record: sre:node_infra:memory_utilization_per_node
  - name: sre-infra-resizing-alerts
    rules:
    ##
    ## Tier 1: Initial threshold breach warnings.
    ## These fire after 10m to confirm the condition is not a momentary blip.
    ##
    ## CPU short window: N-1 infra nodes exceed 85% CPU utilization.
    - alert: cpu-InfraNodesExcessiveResourceConsumptionSRE2h
      expr: |
        count(sre:node_infra:cpu_utilization_per_node > 0.85)
        >=
        count(cluster:nodes_roles{label_node_role_kubernetes_io="infra"}) - 1
      for: 10m
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        message: "At least N-1 infrastructure nodes have had CPU utilization above 85% for 10 minutes. See linked SOP for details."
    ## CPU long window: N-1 infra nodes exceed 75% CPU utilization.
    - alert: cpu-InfraNodesExcessiveResourceConsumptionSRE12h
      expr: |
        count(sre:node_infra:cpu_utilization_per_node > 0.75)
        >=
        count(cluster:nodes_roles{label_node_role_kubernetes_io="infra"}) - 1
      for: 10m
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        message: "At least N-1 infrastructure nodes have had CPU utilization above 75% for 10 minutes. See linked SOP for details."
    ## Memory short window: N-1 infra nodes exceed 80% memory utilization.
    - alert: memory-InfraNodesExcessiveResourceConsumptionSRE2h
      expr: |
        count(sre:node_infra:memory_utilization_per_node > 0.80)
        >=
        count(cluster:nodes_roles{label_node_role_kubernetes_io="infra"}) - 1
      for: 10m
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        message: "At least N-1 infrastructure nodes have had memory utilization above 80% for 10 minutes. See linked SOP for details."
    ## Memory long window: N-1 infra nodes exceed 70% memory utilization.
    - alert: memory-InfraNodesExcessiveResourceConsumptionSRE12h
      expr: |
        count(sre:node_infra:memory_utilization_per_node > 0.70)
        >=
        count(cluster:nodes_roles{label_node_role_kubernetes_io="infra"}) - 1
      for: 10m
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        message: "At least N-1 infrastructure nodes have had memory utilization above 70% for 10 minutes. See linked SOP for details."
    ##
    ## Tier 2: Sustained threshold breach warnings.
    ## These fire after the tier 1 warning has persisted for the full reference window,
    ## confirming the capacity problem is sustained and not a transient spike.
    ##
    ## CPU short window sustained: 85% CPU exceeded on N-1 nodes for 2h.
    ## for: 1h50m accounts for the 10m tier 1 duration (1h50m + 10m + 1m tier 3 ≈ 2h total).
    - alert: cpu-InfraNodesNeedResizingSRE2h
      expr: |
        count(ALERTS{alertname="cpu-InfraNodesExcessiveResourceConsumptionSRE2h", alertstate="firing"}) >= 1
      for: 1h50m
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        message: "At least N-1 infrastructure nodes have had CPU utilization above 85% for 2 hours. Infrastructure nodes should be resized. See linked SOP for details."
    ## CPU long window sustained: 75% CPU exceeded on N-1 nodes for 12h.
    ## for: 11h50m accounts for the 10m tier 1 duration (11h50m + 10m + 1m tier 3 ≈ 12h total).
    - alert: cpu-InfraNodesNeedResizingSRE12h
      expr: |
        count(ALERTS{alertname="cpu-InfraNodesExcessiveResourceConsumptionSRE12h", alertstate="firing"}) >= 1
      for: 11h50m
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        message: "At least N-1 infrastructure nodes have had CPU utilization above 75% for 12 hours. Infrastructure nodes should be resized. See linked SOP for details."
    ## Memory short window sustained: 80% memory exceeded on N-1 nodes for 2h.
    ## for: 1h50m accounts for the 10m tier 1 duration (1h50m + 10m + 1m tier 3 ≈ 2h total).
    - alert: memory-InfraNodesNeedResizingSRE2h
      expr: |
        count(ALERTS{alertname="memory-InfraNodesExcessiveResourceConsumptionSRE2h", alertstate="firing"}) >= 1
      for: 1h50m
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        message: "At least N-1 infrastructure nodes have had memory utilization above 80% for 2 hours. Infrastructure nodes should be resized. See linked SOP for details."
    ## Memory long window sustained: 70% memory exceeded on N-1 nodes for 12h.
    ## for: 11h50m accounts for the 10m tier 1 duration (11h50m + 10m + 1m tier 3 ≈ 12h total).
    - alert: memory-InfraNodesNeedResizingSRE12h
      expr: |
        count(ALERTS{alertname="memory-InfraNodesExcessiveResourceConsumptionSRE12h", alertstate="firing"}) >= 1
      for: 11h50m
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        message: "At least N-1 infrastructure nodes have had memory utilization above 70% for 12 hours. Infrastructure nodes should be resized. See linked SOP for details."
    ##
    ## Tier 3: Composite paging alert.
    ## Fires when any tier 2 sustained warning is active, indicating infrastructure nodes
    ## must be resized. This is the single alert that pages SRE.
    ##
    - alert: InfraNodesNeedResizingSRE
      expr: |
        count(
          ALERTS{alertname=~"(cpu|memory)-InfraNodesNeedResizingSRE.+", alertstate="firing"}
        ) >= 1
      for: 1m
      labels:
        severity: critical
        namespace: openshift-monitoring
      annotations:
        message: "The cluster's infrastructure nodes are undersized and must be vertically scaled to support the existing workload. See linked SOP for details."
