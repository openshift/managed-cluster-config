apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: sre-vector-log-forwarding
  namespace: openshift-monitoring
  labels:
    prometheus: sre-vector-log-forwarding
    role: alert-rules
spec:
  groups:
  - name: sre-vector-log-forwarding-recording-rules
    rules:

    # ============================================================================
    # RECORDING RULES - Pre-calculated metrics for dashboards and alerts
    # ============================================================================

    # Calculates the ratio of logs successfully written to S3 vs logs collected from HCP pods
    # Used for SLO tracking and error budget burn calculations
    # Value should be ~1.0 (100% delivery success)
    # Values >1.0 (e.g., 1.15) are normal when draining buffered logs or rate window variance
    # Acceptable: 1.0-1.3 normal, <1.0 sustained indicates backup, >1.5 sustained warrants investigation
    - record: vector:log_delivery:success_ratio
      expr: |
        sum(rate(vector_component_sent_events_total{component_id="hcp_logs"}[5m]))
        /
        sum(rate(vector_component_received_events_total{component_id="kubernetes_logs"}[5m]))

    # Pipeline processing ratio per HCP cluster namespace
    # Measures pipeline processing ratio per cluster (logs through transforms / logs received)
    # Uses custom metric created BEFORE S3 sink - measures transform pipeline health
    # Value should be ~1.0 (logs making it through transforms)
    # Used by VectorClusterPipelineEBBFastSRE and VectorClusterPipelineEBBSlowSRE alerts
    - record: vector:log_delivery:pipeline_ratio:by_cluster
      expr: |
        sum by (pod_namespace) (
          rate(vector_hcp_logs_events_total[5m])
        )
        /
        sum by (pod_namespace) (
          rate(vector_component_received_events_total{component_id="kubernetes_logs"}[5m])
        )

    # Measures how well the S3 sink is keeping up with incoming logs
    # Compares logs queued for S3 vs logs successfully written
    # Value should be ~1.0 (S3 writes keeping up with queue)
    # Values <1.0 indicate backpressure (queue filling faster than S3 writes, buffer will grow)
    # Values >1.0 indicate S3 draining the queue (catching up from previous backlog)
    - record: vector:s3_sink:write_ratio
      expr: |
        sum(rate(vector_component_sent_events_total{component_id="hcp_logs"}[5m]))
        /
        sum(rate(vector_component_received_events_total{component_id="hcp_logs"}[5m]))

    # Total log ingestion rate across all HCP clusters
    # Useful for capacity planning and baseline metrics
    # Value represents events/sec collected from all HCP pod logs
    - record: vector:logs:ingestion_rate
      expr: |
        sum(rate(vector_component_received_events_total{component_id="kubernetes_logs"}[5m]))

    # Total S3 delivery rate
    # Useful for capacity planning and baseline metrics
    # Value represents events/sec successfully written to S3
    # Should be close to ingestion_rate (within ~15%) in steady state
    - record: vector:logs:s3_delivery_rate
      expr: |
        sum(rate(vector_component_sent_events_total{component_id="hcp_logs"}[5m]))

    # Per-pod log ingestion rate
    # Identifies which Vector pods are receiving high log volume from their assigned HCP clusters
    # Useful for diagnosing buffer capacity issues and identifying noisy clusters
    - record: vector:logs:ingestion_rate:by_pod
      expr: |
        sum by (pod) (
          rate(vector_component_received_events_total{component_id="kubernetes_logs"}[5m])
        )

    # Per-pod S3 delivery rate
    # Identifies if specific Vector pods have S3 write performance issues
    # Compare to ingestion_rate:by_pod to identify backpressure on specific pods
    - record: vector:logs:s3_delivery_rate:by_pod
      expr: |
        sum by (pod) (
          rate(vector_component_sent_events_total{component_id="hcp_logs"}[5m])
        )

    # Per-pod write ratio (S3 delivery / ingestion)
    # <1.0 = ingestion exceeds delivery (buffer growing - high log volume or S3 slow)
    # ~1.0 = balanced (healthy steady state)
    # >1.0 = delivery exceeds ingestion (buffer draining - catching up)
    - record: vector:logs:write_ratio:by_pod
      expr: |
        sum by (pod) (
          rate(vector_component_sent_events_total{component_id="hcp_logs"}[5m])
        )
        /
        sum by (pod) (
          rate(vector_component_received_events_total{component_id="kubernetes_logs"}[5m])
        )

    # Per-pod event loss rate (received - sent at S3 sink)
    # Positive values = events accumulating in buffer or being lost (bad)
    # Negative values = buffer draining, S3 keeping up (good)
    # Near zero = perfectly balanced (healthy)
    # Used by VectorEventLossPerPodSRE alert
    - record: vector:hcp_logs:event_loss_rate:by_pod
      expr: |
        sum by (pod) (
          rate(vector_component_received_events_total{
            component_id="hcp_logs",
            namespace="hypershift-control-plane-log-forwarding"
          }[5m])
        )
        -
        sum by (pod) (
          rate(vector_component_sent_events_total{
            component_id="hcp_logs",
            namespace="hypershift-control-plane-log-forwarding"
          }[5m])
        )

    # Per-cluster log ingestion rate
    # Identifies which HCP clusters are generating the most log volume
    # >2000 events/sec may indicate runaway logging or cluster degradation
    # Previously alert VectorClusterExcessiveLogsSRE — demoted to recording rule
    - record: vector:cluster:ingestion_rate
      expr: |
        sum by (pod_namespace) (
          rate(vector_component_received_events_total{component_id="kubernetes_logs",namespace="hypershift-control-plane-log-forwarding"}[5m])
        )

    # S3 write error rate
    # Non-zero indicates S3 API errors (throttling, connectivity, IAM issues)
    # Errors may be retried successfully — check S3 delivery ratio for actual impact
    # Previously alert VectorS3ErrorsSRE — demoted to recording rule
    - record: vector:s3:error_rate
      expr: |
        sum(rate(vector_component_errors_total{component_id="hcp_logs",namespace="hypershift-control-plane-log-forwarding"}[5m]))

    # Per-pod buffer growth rate (bytes/sec)
    # Positive = buffer growing, negative = buffer shrinking
    # >1,677,721.6 bytes/sec = >100 MB/min growth
    # Previously alert VectorBufferGrowingRapidlySRE — demoted to recording rule
    - record: vector:buffer:growth_rate:by_pod
      expr: |
        deriv(vector_buffer_byte_size{buffer_id="hcp_logs",namespace="hypershift-control-plane-log-forwarding"}[5m])

    # Per-component VRL transform error rate
    # Identifies which transform stage is experiencing errors
    # Impact caught by per-cluster pipeline EBB alerts
    # Previously alert VectorTransformErrorsSRE — demoted to recording rule
    - record: vector:transform:error_rate:by_component
      expr: |
        sum by (component_id) (
          rate(vector_component_errors_total{
            component_id=~"enrich_metadata|parse_json_logs|parse_plain_text_timestamps",
            namespace="hypershift-control-plane-log-forwarding"
          }[5m])
        )

    # Buffer saturation per pod (0.0 = empty, 1.0 = full)
    # 10GB max buffer size
    - record: vector:s3_sink:buffer_saturation:by_pod
      expr: |
        vector_buffer_byte_size{buffer_id="hcp_logs",namespace="hypershift-control-plane-log-forwarding"} / 10737418240

    # Vector pods currently down (up == 0)
    # Used for troubleshooting VectorPodDownSRE alert
    # Query this to identify which specific pods are affected
    - record: vector:pods:down
      expr: |
        up{job="hypershift-control-plane-log-forwarding/control-plane-log-forwarding-cmo"} == 0

  - name: sre-vector-log-forwarding-infrastructure-alerts
    rules:

    # ============================================================================
    # INFRASTRUCTURE ALERTS - Vector pod and monitoring health
    # These alerts fire regardless of whether HCP clusters exist
    # ============================================================================

    # CRITICAL: One or more Vector DaemonSet pods are down
    # Consolidates per-pod down status into a single alert with count
    # Use vector:pods:down recording rule to identify which specific pods are affected
    # Common causes: Node issues, resource constraints, image pull failures, crashloops
    - alert: VectorPodDownSRE
      expr: |
        count(up{job="hypershift-control-plane-log-forwarding/control-plane-log-forwarding-cmo"} == 0) > 0
      for: 5m
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        summary: "{{ $value }} Vector pod(s) down"
        description: "{{ $value }} Vector DaemonSet pod(s) have been unreachable for 5 minutes. Log collection is interrupted on affected nodes. Query vector:pods:down to see which specific pods are affected."
        SOP: https://github.com/openshift/ops-sop/blob/master/v4/alerts/hypershift/VectorPodDownSRE.md
        query: up{job="hypershift-control-plane-log-forwarding/control-plane-log-forwarding-cmo"} == 0

    # CRITICAL: All Vector metrics are absent from Prometheus
    # Detects complete monitoring failure - either all pods are down or Prometheus scraping is broken
    # This is a safety net alert for catastrophic infrastructure failure
    # If this fires, check Vector pod status AND Prometheus scraping (PodMonitor, RBAC, network)
    - alert: VectorMetricsAbsentSRE
      expr: |
        absent(vector_component_received_events_total{component_id="vector_metrics"})
      for: 5m
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        summary: Vector metrics completely absent from Prometheus
        description: "No Vector metrics are being scraped. Either all Vector pods are down or Prometheus scraping is broken. Check Vector pod status, PodMonitor configuration, and Prometheus scrape targets."
        SOP: https://github.com/openshift/ops-sop/blob/master/v4/alerts/hypershift/VectorMetricsAbsentSRE.md

  - name: sre-vector-log-forwarding-critical-alerts
    rules:

    # ============================================================================
    # CRITICAL ALERTS - Immediate attention required
    # NOTE: Temporarily set to severity: warning for initial deployment and validation
    #       These will be changed to severity: critical after soaking period
    # ============================================================================

    # CRITICAL: A specific HCP cluster has stopped producing logs
    # Detects per-cluster ingestion failure by comparing current rate to 15m ago
    # Only fires if the cluster was actively producing logs (>10 events/sec) 15 minutes ago
    # and has now dropped to zero AND the HCP namespace still exists
    # The namespace existence check (via label_replace to match pod_namespace to namespace)
    # prevents false alerts during intentional cluster teardowns
    # We own the HCP control plane, so cluster-specific collection failures are our responsibility
    # Possible causes: HCP pods crashed, node hosting the cluster went down, RBAC change
    # TEMPORARILY WARNING: Set to warning for initial validation
    - alert: VectorClusterIngestionFailureSRE
      expr: |
        (
          (
            sum by (pod_namespace) (
              rate(vector_component_received_events_total{
                component_id="kubernetes_logs",
                namespace="hypershift-control-plane-log-forwarding"
              }[5m] offset 15m)
            ) > 10
          )
          unless
          (
            sum by (pod_namespace) (
              rate(vector_component_received_events_total{
                component_id="kubernetes_logs",
                namespace="hypershift-control-plane-log-forwarding"
              }[5m])
            ) > 0
          )
        )
        and on(pod_namespace)
        (
          label_replace(
            kube_namespace_labels{label_hypershift_openshift_io_hosted_control_plane="true"},
            "pod_namespace", "$1", "namespace", "(.*)"
          )
        )
      for: 5m
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        summary: "HCP cluster {{ $labels.pod_namespace }} log collection stopped"
        description: "Cluster {{ $labels.pod_namespace }} was producing logs 15 minutes ago but has stopped. Check Vector pod status on the node hosting this cluster."
        SOP: https://github.com/openshift/ops-sop/blob/master/v4/alerts/hypershift/VectorClusterIngestionFailureSRE.md

    # CRITICAL: Vector has stopped collecting logs from HCP pods entirely
    # This indicates a complete failure of log collection
    # Only fires when HCP namespaces exist (checks kube-state-metrics for namespace labels)
    # Detects functional failure of kubernetes_logs source independent of pod/infrastructure health
    # Possible causes: RBAC/SCC issues, k8s API connectivity problems, source config errors
    # TEMPORARILY WARNING: Set to warning for initial validation
    - alert: VectorNoLogsIngestedSRE
      expr: |
        (
          count(kube_namespace_labels{label_hypershift_openshift_io_hosted_control_plane="true"}) > 0
          and
          sum(rate(vector_component_received_events_total{component_id="kubernetes_logs"}[5m])) == 0
        )
      for: 5m
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        summary: Vector is not collecting any logs from HCP pods
        description: No logs have been collected in the last 5 minutes. Check Vector pod status and k8s API connectivity.
        SOP: https://github.com/openshift/ops-sop/blob/master/v4/alerts/hypershift/VectorNoLogsIngestedSRE.md

    # CRITICAL: Vector has stopped writing logs to S3 entirely
    # Logs are being collected but not delivered - they will be buffered until disk fills
    # Only fires when HCP clusters exist and are actively generating logs
    # Checks if HCP logs are being processed AND S3 writes have stopped
    # Possible causes: S3 connectivity issues, IAM role problems, S3 bucket access denied
    # TEMPORARILY WARNING: Set to warning for initial validation
    - alert: VectorS3WritesStoppedSRE
      expr: |
        (
          sum(rate(vector_hcp_logs_events_total[5m])) > 0
          and
          sum(rate(vector_component_sent_events_total{component_id="hcp_logs"}[5m])) == 0
        )
      for: 5m
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        summary: Vector has stopped writing logs to S3
        description: No logs have been written to S3 in the last 5 minutes. Buffer will eventually fill. Check S3 access and IAM roles.
        SOP: https://github.com/openshift/ops-sop/blob/master/v4/alerts/hypershift/VectorS3WritesStoppedSRE.md

    # CRITICAL: Vector is missing MC_CLUSTER_ID environment variable
    # This indicates the ClusterDeployment label 'api.openshift.com/id' is missing
    # or Hive template interpolation failed during SelectorSyncSet deployment
    # Impact:
    #   - All logs will be written to S3 path: s3://bucket/unknown/...
    #   - Cannot identify which Management Cluster generated the logs
    #   - Multiple MCs writing to same bucket will have path collisions
    #   - Troubleshooting becomes extremely difficult
    # Resolution:
    #   - Verify ClusterDeployment has label: api.openshift.com/id
    #   - Check Hive SelectorSyncSet template interpolation
    #   - Restart Vector pods after fixing label
    # TEMPORARILY WARNING: Set to warning for initial validation
    - alert: VectorMissingClusterIDSRE
      expr: |
        sum by (mc_cluster_id) (
          rate(vector_hcp_logs_events_total{mc_cluster_id="unknown"}[5m])
        ) > 0
      for: 5m
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        summary: Vector is missing MC_CLUSTER_ID environment variable
        description: "Logs are being tagged with mc_cluster_id='unknown', indicating the ClusterDeployment label 'api.openshift.com/id' is missing or Hive template interpolation failed. S3 logs will be unidentifiable by Management Cluster."
        SOP: https://github.com/openshift/ops-sop/blob/master/v4/alerts/hypershift/VectorMissingClusterIDSRE.md

  - name: sre-vector-log-forwarding-warning-alerts
    rules:

    # ============================================================================
    # WARNING ALERTS - Investigation needed but not immediately critical
    # ============================================================================

    # CRITICAL: Per-cluster pipeline error budget burn - fast detection
    # Combined condition: pipeline ratio below 99% AND VRL transform errors exist
    #
    # Why combined? The pipeline ratio alone produces false positives due to measurement timing:
    # - The ratio compares two metrics (vector_hcp_logs_events_total vs kubernetes_logs received)
    #   sampled at different pipeline stages within the same 5m rate window
    # - Low-volume clusters (50-100 events/sec) routinely show 93-98% ratio with zero actual loss
    # - Validated: 8-9 clusters in int consistently sit at 95-98% with zero transform errors
    #   and zero discarded events — the gap is measurement noise, not log loss
    #
    # The transform errors condition gates on real VRL failures. When a VRL script encounters
    # a log format it can't handle, vector_component_errors_total increments. Even 1 error/sec
    # on a 76 events/sec cluster pushes the ratio below 99%.
    #
    # The errors condition uses on() (empty label match) because transforms are MC-wide —
    # there is no per-cluster transform config. If any transform is erroring, all clusters
    # on the MC are affected.
    #
    # We own the HCP control plane — transform failures are our VRL bug to fix
    # Possible causes: VRL script bug, unexpected log format from HCP component update
    # TEMPORARILY WARNING: Set to warning for initial validation
    - alert: VectorClusterPipelineEBBFastSRE
      expr: |
        (vector:log_delivery:pipeline_ratio:by_cluster < 0.99)
        and on()
        (
          sum(rate(vector_component_errors_total{
            component_id=~"enrich_metadata|parse_json_logs|parse_plain_text_timestamps"
          }[5m])) > 0
        )
      for: 15m
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        summary: "HCP cluster {{ $labels.pod_namespace }} pipeline below 99% with active transform errors"
        description: "Cluster {{ $labels.pod_namespace }} pipeline ratio: {{ $value | humanizePercentage }}. VRL transform errors are occurring on this MC. Transforms are MC-wide — all clusters on this MC are affected."
        SOP: https://github.com/openshift/ops-sop/blob/master/v4/alerts/hypershift/VectorClusterPipelineEBBFastSRE.md

    # WARNING: Per-cluster pipeline error budget burn - slow detection
    # Same combined condition as fast burn but with longer duration
    # Catches sustained low-rate transform errors that the fast burn's 15m window might miss
    # if errors are intermittent but persistent over hours
    - alert: VectorClusterPipelineEBBSlowSRE
      expr: |
        (vector:log_delivery:pipeline_ratio:by_cluster < 0.99)
        and on()
        (
          sum(rate(vector_component_errors_total{
            component_id=~"enrich_metadata|parse_json_logs|parse_plain_text_timestamps"
          }[5m])) > 0
        )
      for: 3h
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        summary: "HCP cluster {{ $labels.pod_namespace }} pipeline below 99% with transform errors for 3h"
        description: "Cluster {{ $labels.pod_namespace }} pipeline ratio: {{ $value | humanizePercentage }}. Sustained VRL transform errors on this MC for 3 hours. Transforms are MC-wide — all clusters on this MC are affected."
        SOP: https://github.com/openshift/ops-sop/blob/master/v4/alerts/hypershift/VectorClusterPipelineEBBSlowSRE.md

    # WARNING: Per-pod S3 delivery error budget burn
    # Combined condition: write ratio below 99% AND buffer actively growing AND buffer above 10MB
    #
    # Why combined? The write ratio alone produces false positives due to Vector's batch behavior:
    # - Vector accumulates events for up to 60s (batch timeout), then flushes to S3 in a burst
    # - During accumulation, sent rate drops while received stays constant, creating ratio dips
    # - A pod can show 77% write ratio at any instant but have empty buffers and 100% delivery
    # - The buffer conditions confirm actual delivery degradation, not just batching variance
    #
    # Why 99%? The buffer growth condition does the heavy lifting for precision. At 99% with
    # buffer >10MB and growing, only pods with genuinely stuck/growing buffers match. Pods with
    # normal batching oscillation (200MB bouncing up and down) won't sustain the condition for 1h.
    # Validated against int (750m CPU, healthy) and stage (300m CPU, throttled):
    # - Int: 0-1 pods match instant query, none sustain for 1h
    # - Stage: 8-13 match instant query, only pods with full buffers (9.8GB) sustain
    #
    # The buffer >10MB filter excludes pods with tiny/empty buffers where the ratio dip is harmless
    # The deriv >0 over 30m confirms the buffer is actively growing, not just sitting with residual data
    # The for: 1h duration ensures this is sustained, not a transient burst
    #
    # No separate slow burn variant — VectorBufferNearCapacitySRE (buffer >7GB, for 10m) serves as
    # the natural escalation. If the delivery EBB fires at 10MB+ buffer growing and the problem
    # persists, the buffer capacity alert fires when it hits 7GB. Together they form the progression:
    # delivery degradation detected (this alert) → buffer filling (VectorBufferNearCapacitySRE)
    #
    # S3 delivery failures affect all clusters on the pod equally (same sink, same IAM, same bucket)
    # Possible causes: S3 throttling, IAM issues, CPU throttling, network issues
    - alert: VectorS3DeliveryEBBSRE
      expr: |
        (vector:logs:write_ratio:by_pod < 0.99)
        and on(pod)
        (deriv(vector_buffer_byte_size{buffer_id="hcp_logs"}[30m]) > 0)
        and on(pod)
        (vector_buffer_byte_size{buffer_id="hcp_logs"} > 10485760)
      for: 1h
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        summary: "Vector pod {{ $labels.pod }} S3 delivery below 99% with growing buffer for 1h"
        description: "Pod {{ $labels.pod }} S3 delivery ratio: {{ $value | humanizePercentage }} with buffer actively growing above 10MB. S3 sink cannot keep up with ingestion. Check CPU throttling, S3 errors, and buffer size."
        SOP: https://github.com/openshift/ops-sop/blob/master/v4/alerts/hypershift/VectorS3DeliveryEBBSRE.md

    # WARNING: Disk buffer is >70% full (7GB of 10GB)
    # Buffer filling indicates S3 writes are slower than log ingestion
    # If buffer reaches 100%, Vector will BLOCK log collection (when_full: block)
    - alert: VectorBufferNearCapacitySRE
      expr: |
        vector_buffer_byte_size{buffer_id="hcp_logs"} > 7516192768
      for: 10m
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        summary: "Vector S3 buffer is >70% full on pod {{ $labels.pod }}"
        description: "Buffer size: {{ $value | humanize1024 }}B (>7GB threshold). If buffer reaches 10GB, log collection will be blocked."
        SOP: https://github.com/openshift/ops-sop/blob/master/v4/alerts/hypershift/VectorBufferNearCapacitySRE.md


