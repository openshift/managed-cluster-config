apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    prometheus: sre-operators-recording-rules
    role: recording-rules
  name: sre-operators-recording-rules
  namespace: openshift-monitoring
spec:
  groups:
    - name: sre-operators.rules
      rules:
        # OLM-based operators
        - expr:
            # csv_succeeded has a value of 1 or 0
            # subscription_sync_total is an integer with value >0
            # joining them with the operator ^ returns a value of 1 or 0
              label_replace(sre:telemetry:managed_labels, "cluster_version", "$0", "version", ".*")
            * on () group_right (_id, cluster_version, provider)
              sum by (exported_namespace, name, version, channel, package) (
                  label_replace(csv_succeeded, "name", "$1", "name", "([^.]+).*")
                ^ on (name) group_left (channel, package)
                  subscription_sync_total{name=~"addon-operator|aws-vpce-operator|custom-domains-operator|managed-node-metadata-operator|managed-upgrade-operator|must-gather-operator|ocm-agent-operator|osd-metrics-exporter|rbac-permissions-operator|openshift-splunk-forwarder-operator|aws-account-operator|certman-operator|cloud-ingress-operator|configure-alertmanager-operator|deadmanssnitch-operator|deployment-validation-operator|dynatrace-operator|gcp-project-operator|managed-velero-operator|observability-operator|opentelemetry-operator|pagerduty-operator|route-monitor-operator"}
              )
          record:
            sre:operators:succeeded:olm
        # PKO-based operators
        # Uses package_operator_package_availability metric exported by package-operator itself
        - expr:
            # package_operator_package_availability=1 means operator is successfully deployed
            # We construct labels to match OLM format: exported_namespace, name, version, channel, package
              label_replace(sre:telemetry:managed_labels, "cluster_version", "$0", "version", ".*")
            * on () group_right (_id, cluster_version, provider)
              max by (exported_namespace, name, version, channel, package) (
                label_replace(
                  label_replace(
                    label_replace(
                      label_replace(
                        label_replace(
                          (package_operator_package_availability{pko_name=~"addon-operator|aws-vpce-operator|custom-domains-operator|managed-node-metadata-operator|managed-upgrade-operator|must-gather-operator|ocm-agent-operator|osd-metrics-exporter|rbac-permissions-operator|openshift-splunk-forwarder-operator|aws-account-operator|certman-operator|cloud-ingress-operator|configure-alertmanager-operator|deadmanssnitch-operator|deployment-validation-operator|dynatrace-operator|gcp-project-operator|managed-velero-operator|observability-operator|opentelemetry-operator|pagerduty-operator|route-monitor-operator"} == 1),
                          "exported_namespace", "openshift-$1", "pko_name", "^(?:openshift-)?(.*)$"
                        ),
                        "version", "$1", "image", "^[^@]+:([^@]+)(?:@.+)?$"
                      ),
                      "channel", "pko", "", ""
                    ),
                    "package", "$1", "pko_name", "(.*)$"
                  ),
                  "name", "$1", "pko_name", "(.*)$"
                )
              )
          record:
            sre:operators:succeeded:pko
        # evaulate raw metric success on success of either olm or pko
        - expr:
            sre:operators:succeeded:olm or sre:operators:succeeded:pko
          record:
            sre:operators:succeeded:raw
        - expr:
            # making sure that operators installed in user workload namespaces are ignored in case the same operator is installed in an openshift namespace
            sre:operators:succeeded:raw{exported_namespace =~ "openshift-.*"}
            or on(_id, name)
            sre:operators:succeeded:raw{exported_namespace !~ "openshift-.*"}
          record: sre:operators:succeeded
        # Detect missing critical operator deployments
        # Returns 1 for each operator where deployment is missing (namespace may or may not exist)
        - expr: |
            label_replace(absent(kube_deployment_status_replicas{namespace="openshift-aws-vpce-operator", deployment="aws-vpce-operator"}) * 1, "namespace", "openshift-aws-vpce-operator", "", "")
            or label_replace(absent(kube_deployment_status_replicas{namespace="openshift-managed-upgrade-operator", deployment="managed-upgrade-operator"}) * 1, "namespace", "openshift-managed-upgrade-operator", "", "")
            or label_replace(absent(kube_deployment_status_replicas{namespace="openshift-ocm-agent-operator", deployment="ocm-agent-operator"}) * 1, "namespace", "openshift-ocm-agent-operator", "", "")
            or label_replace(absent(kube_deployment_status_replicas{namespace="openshift-route-monitor-operator", deployment="route-monitor-operator-controller-manager"}) * 1, "namespace", "openshift-route-monitor-operator", "", "")
            or label_replace(absent(kube_deployment_status_replicas{namespace="openshift-splunk-forwarder-operator", deployment="splunk-forwarder-operator"}) * 1, "namespace", "openshift-splunk-forwarder-operator", "", "")
            or label_replace(absent(kube_deployment_status_replicas{namespace="openshift-monitoring", deployment="configure-alertmanager-operator"}) * 1, "namespace", "openshift-monitoring", "", "")
          record: sre:operators:deployment_missing
