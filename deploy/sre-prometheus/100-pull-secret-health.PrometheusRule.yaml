apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    prometheus: sre-pull-secret-health-alerts
    role: alert-rules
  name: sre-pull-secret-health-alerts
  namespace: openshift-monitoring
spec:
  groups:
  - name: sre-pull-secret-health-alerts
    rules:
    - alert: ClusterPullSecretInvalidSRE
      # Alert if the cluster pull secret is missing, malformed, or lacks
      # required registry credentials (cloud.openshift.com, quay.io,
      # registry.redhat.io, registry.connect.redhat.com)
      expr: pull_secret_valid{name="osd_exporter"} == 0
      for: 15m
      labels:
        severity: warning
        namespace: openshift-monitoring
      annotations:
        summary: Cluster pull secret is invalid.
        description: >-
          Cluster pull secret is invalid (reason: {{ $labels.reason }}).
          This may cause image pull failures, operator updates, and
          telemetry reporting issues.
