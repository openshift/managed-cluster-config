apiVersion: ocmagent.managed.openshift.io/v1alpha1
kind: ManagedFleetNotification
metadata:
  name: ingress-controller-degraded
  namespace: openshift-ocm-agent-operator
spec:
  fleetNotification:
    name: ingress-controller-degraded
    summary: Action Required - Ingress operator has been degraded for more than 30 minutes
    notificationMessage: |-
      Your ROSA HyperShift cluster's ingress operator has been reporting a degraded IngressController for more than 30 minutes. This prevents external traffic from reaching your cluster.

      The most common cause on ROSA HyperShift clusters is missing or insufficient AWS IAM permissions for Elastic Load Balancing (ELB), which prevents the default IngressController's LoadBalancer from being provisioned.

      To check for IAM-related issues:
      1. Review the IAM permissions attached to your cluster's ingress operator role (the STS role used by the ingress operator for ELB management) and ensure ELB permissions are present.
      2. Verify the AWS service-linked role for ELB exists: aws iam get-role --role-name AWSServiceRoleForElasticLoadBalancing
      3. If the role is missing, create it: aws iam create-service-linked-role --aws-service-name elasticloadbalancing.amazonaws.com

      Other possible causes include VPC or subnet misconfiguration and IngressController resource conflicts. Check the ingress operator logs and IngressController status for more detail.

      For detailed troubleshooting steps and required IAM policies, please refer to: https://docs.openshift.com/rosa/rosa_hcp/rosa-hcp-sts-creating-a-cluster-quickly.html

      If you need assistance, please open a support case.
    resendWait: 24
    severity: Warning
    limitedSupport: false
