apiVersion: ocmagent.managed.openshift.io/v1alpha1
kind: ManagedFleetNotification
metadata:
  name: ingress-loadbalancer-provisioning-failed
  namespace: openshift-ocm-agent-operator
spec:
  fleetNotification:
    name: ingress-loadbalancer-provisioning-failed
    summary: Action Required - Ingress LoadBalancer cannot be provisioned due to IAM permission issues
    notificationMessage: |-
      Your ROSA HyperShift cluster's ingress LoadBalancer has failed to provision for more than 30 minutes. This prevents external traffic from reaching your cluster and is likely caused by missing or insufficient AWS IAM permissions for Elastic Load Balancing (ELB).

      Common causes include:
      - Missing IAM permissions for ELB management (e.g., elasticloadbalancing:CreateLoadBalancer, elasticloadbalancing:DescribeLoadBalancers)
      - Service-linked role for ELB not created in your AWS account
      - VPC or subnet configuration preventing LoadBalancer provisioning

      To resolve this issue:
      1. Review the IAM permissions attached to your cluster's worker node role and ensure ELB permissions are present.
      2. Verify the AWS service-linked role for ELB exists: aws iam get-role --role-name AWSServiceRoleForElasticLoadBalancing
      3. If the role is missing, create it: aws iam create-service-linked-role --aws-service-name elasticloadbalancing.amazonaws.com

      For detailed troubleshooting steps and required IAM policies, please refer to: https://docs.openshift.com/rosa/rosa_architecture/rosa-sts-about-iam-resources.html

      If you need assistance, please open a support case.
    resendWait: 24
    severity: Warning
    limitedSupport: false
