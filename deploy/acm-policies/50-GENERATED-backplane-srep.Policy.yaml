---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
    annotations:
        policy.open-cluster-management.io/categories: CM Configuration Management
        policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
        policy.open-cluster-management.io/standards: NIST SP 800-53
    name: backplane-srep
    namespace: openshift-acm-policies
spec:
    disabled: false
    policy-templates:
        - objectDefinition:
            apiVersion: policy.open-cluster-management.io/v1
            kind: ConfigurationPolicy
            metadata:
                name: backplane-srep
            spec:
                evaluationInterval:
                    compliant: 2h
                    noncompliant: 45s
                object-templates:
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: v1
                        kind: Namespace
                        metadata:
                            name: openshift-backplane-srep
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: rbac.authorization.k8s.io/v1
                        kind: ClusterRole
                        metadata:
                            name: backplane-srep-admins-cluster
                        rules:
                            - apiGroups:
                                - ""
                              resources:
                                - nodes/proxy
                              verbs:
                                - get
                            - apiGroups:
                                - config.openshift.io
                              resources:
                                - projects
                              verbs:
                                - get
                                - list
                                - watch
                            - apiGroups:
                                - project.openshift.io
                              resources:
                                - projects
                                - projectrequests
                              verbs:
                                - get
                                - list
                                - watch
                            - apiGroups:
                                - ""
                              resources:
                                - namespaces
                                - namespaces/finalize
                              verbs:
                                - get
                                - list
                                - watch
                            - nonResourceURLs:
                                - '*'
                              verbs:
                                - get
                            - apiGroups:
                                - authentication.k8s.io
                              resources:
                                - tokenreviews
                              verbs:
                                - create
                            - apiGroups:
                                - authorization.k8s.io
                              resources:
                                - localsubjectaccessreviews
                                - selfsubjectaccessreviews
                                - selfsubjectrulesreviews
                                - subjectaccessreviews
                              verbs:
                                - create
                            - apiGroups:
                                - authorization.openshift.io
                              resources:
                                - localresourceaccessreviews
                                - localsubjectaccessreviews
                                - resourceaccessreviews
                                - selfsubjectrulesreviews
                                - subjectaccessreviews
                                - subjectrulesreviews
                              verbs:
                                - create
                            - apiGroups:
                                - machineconfiguration.openshift.io
                              resources:
                                - '*'
                              verbs:
                                - get
                                - list
                                - watch
                            - apiGroups:
                                - machine.openshift.io
                              resources:
                                - '*'
                              verbs:
                                - get
                                - list
                                - watch
                            - apiGroups:
                                - autoscaling.openshift.io
                              resources:
                                - '*'
                              verbs:
                                - get
                                - list
                                - watch
                            - apiGroups:
                                - apiserver.openshift.io
                              resources:
                                - apirequestcounts
                              verbs:
                                - get
                                - list
                                - watch
                            - apiGroups:
                                - certificates.k8s.io
                              resources:
                                - certificatesigningrequests
                              verbs:
                                - get
                                - list
                                - watch
                            - apiGroups:
                                - avo.openshift.io
                              resources:
                                - vpcendpoints
                              verbs:
                                - get
                                - list
                                - watch
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: rbac.authorization.k8s.io/v1
                        kind: ClusterRole
                        metadata:
                            name: backplane-srep-admins-project
                        rules:
                            - apiGroups:
                                - ""
                              resources:
                                - pods/portforward
                              verbs:
                                - create
                            - apiGroups:
                                - security.openshift.io
                              resources:
                                - podsecuritypolicyreviews
                                - podsecuritypolicyselfsubjectreviews
                                - podsecuritypolicysubjectreviews
                              verbs:
                                - create
                            - apiGroups:
                                - logging.openshift.io
                              resources:
                                - '*'
                              verbs:
                                - get
                                - list
                                - watch
                            - apiGroups:
                                - velero.io
                              resources:
                                - '*'
                              verbs:
                                - get
                                - list
                                - watch
                            - apiGroups:
                                - monitoring.coreos.com
                              resources:
                                - '*'
                              verbs:
                                - get
                                - list
                                - watch
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: rbac.authorization.k8s.io/v1
                        kind: Role
                        metadata:
                            name: backplane-srep-muo
                            namespace: openshift-managed-upgrade-operator
                        rules:
                            - apiGroups:
                                - coordination.k8s.io
                              resources:
                                - leases
                              verbs:
                                - get
                                - list
                                - watch
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: rbac.authorization.k8s.io/v1
                        kind: Role
                        metadata:
                            name: backplane-srep-mustgather
                            namespace: openshift-must-gather-operator
                        rules:
                            - apiGroups:
                                - ""
                              resources:
                                - secrets
                              verbs:
                                - create
                            - apiGroups:
                                - managed.openshift.io
                              resources:
                                - mustgathers
                              verbs:
                                - create
                                - delete
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: rbac.authorization.k8s.io/v1
                        kind: RoleBinding
                        metadata:
                            name: backplane-srep-muo
                            namespace: openshift-managed-upgrade-operator
                        roleRef:
                            apiGroup: rbac.authorization.k8s.io
                            kind: Role
                            name: backplane-srep-muo
                        subjects:
                            - apiGroup: rbac.authorization.k8s.io
                              kind: Group
                              name: system:serviceaccounts:openshift-backplane-srep
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: rbac.authorization.k8s.io/v1
                        kind: RoleBinding
                        metadata:
                            name: backplane-srep-mustgather
                            namespace: openshift-must-gather-operator
                        roleRef:
                            apiGroup: rbac.authorization.k8s.io
                            kind: Role
                            name: backplane-srep-mustgather
                        subjects:
                            - apiGroup: rbac.authorization.k8s.io
                              kind: Group
                              name: system:serviceaccounts:openshift-backplane-srep
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: rbac.authorization.k8s.io/v1
                        kind: Role
                        metadata:
                            name: backplane-srep-pcap-collector
                            namespace: openshift-backplane-managed-scripts
                        rules:
                            - apiGroups:
                                - ""
                              resourceNames:
                                - pcap-collector-creds
                              resources:
                                - secrets
                              verbs:
                                - delete
                            - apiGroups:
                                - ""
                              resources:
                                - secrets
                              verbs:
                                - create
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: rbac.authorization.k8s.io/v1
                        kind: RoleBinding
                        metadata:
                            name: backplane-srep-mustgather
                            namespace: openshift-backplane-managed-scripts
                        roleRef:
                            apiGroup: rbac.authorization.k8s.io
                            kind: Role
                            name: backplane-srep-pcap-collector
                        subjects:
                            - apiGroup: rbac.authorization.k8s.io
                              kind: Group
                              name: system:serviceaccounts:openshift-backplane-srep
                pruneObjectBehavior: DeleteIfCreated
                remediationAction: enforce
                severity: low
    remediationAction: enforce
---
apiVersion: apps.open-cluster-management.io/v1
kind: PlacementRule
metadata:
    name: placement-backplane-srep
    namespace: openshift-acm-policies
spec:
    clusterSelector:
        matchExpressions:
            - key: hypershift.open-cluster-management.io/hosted-cluster
              operator: In
              values:
                - "true"
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
    name: binding-backplane-srep
    namespace: openshift-acm-policies
placementRef:
    apiGroup: apps.open-cluster-management.io
    kind: PlacementRule
    name: placement-backplane-srep
subjects:
    - apiGroup: policy.open-cluster-management.io
      kind: Policy
      name: backplane-srep
