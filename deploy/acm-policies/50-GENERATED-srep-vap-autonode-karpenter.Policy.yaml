---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
    annotations:
        policy.open-cluster-management.io/categories: CM Configuration Management
        policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
        policy.open-cluster-management.io/standards: NIST SP 800-53
    name: srep-vap-autonode-karpenter
    namespace: openshift-acm-policies
spec:
    disabled: false
    policy-templates:
        - objectDefinition:
            apiVersion: policy.open-cluster-management.io/v1
            kind: ConfigurationPolicy
            metadata:
                name: srep-vap-autonode-karpenter
            spec:
                evaluationInterval:
                    compliant: 2h
                    noncompliant: 45s
                object-templates:
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: admissionregistration.k8s.io/v1
                        kind: ValidatingAdmissionPolicy
                        metadata:
                            name: autonode-nodepool-guardrails
                        spec:
                            failurePolicy: Fail
                            matchConstraints:
                                resourceRules:
                                    - apiGroups:
                                        - karpenter.sh
                                      apiVersions:
                                        - v1
                                      operations:
                                        - CREATE
                                        - UPDATE
                                      resources:
                                        - nodepools
                            validations:
                                - expression: |
                                    !has(object.spec.template.spec.requirements) ||
                                    object.spec.template.spec.requirements
                                      .filter(r, r.key == 'node.kubernetes.io/instance-type' && r.operator == 'In')
                                      .all(r, r.values.all(v,
                                        !v.matches('\\.(nano|micro|small|medium)$')
                                      ))
                                  message: Instance types ending in .nano, .micro, .small, or .medium are not allowed. Use .large or bigger.
                                - expression: |
                                    !has(object.spec.template.metadata) ||
                                    !has(object.spec.template.metadata.labels) ||
                                    !('node-role.kubernetes.io/master' in object.spec.template.metadata.labels) &&
                                    !('node-role.kubernetes.io/infra' in object.spec.template.metadata.labels) &&
                                    !('node-role.kubernetes.io/control-plane' in object.spec.template.metadata.labels)
                                  message: Labels node-role.kubernetes.io/master, node-role.kubernetes.io/infra, and node-role.kubernetes.io/control-plane are reserved and cannot be set on NodePools.
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: admissionregistration.k8s.io/v1
                        kind: ValidatingAdmissionPolicyBinding
                        metadata:
                            name: autonode-nodepool-guardrails-binding
                        spec:
                            policyName: autonode-nodepool-guardrails
                            validationActions:
                                - Deny
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: admissionregistration.k8s.io/v1
                        kind: ValidatingAdmissionPolicy
                        metadata:
                            name: autonode-ec2nodeclass-guardrails
                        spec:
                            failurePolicy: Fail
                            matchConstraints:
                                resourceRules:
                                    - apiGroups:
                                        - karpenter.hypershift.openshift.io
                                      apiVersions:
                                        - v1beta1
                                      operations:
                                        - CREATE
                                        - UPDATE
                                      resources:
                                        - openshiftec2nodeclasses
                            validations:
                                - expression: |
                                    !has(object.spec.blockDeviceMappings) ||
                                    object.spec.blockDeviceMappings.all(bdm,
                                      !has(bdm.ebs) ||
                                      !has(bdm.ebs.volumeSize) ||
                                      int(string(bdm.ebs.volumeSize).replace('Gi', '').replace('G', '')) >= 100
                                    )
                                  message: EBS volume size must be at least 100Gi.
                                - expression: |
                                    !has(object.spec.blockDeviceMappings) ||
                                    object.spec.blockDeviceMappings.all(bdm,
                                      !has(bdm.ebs) ||
                                      (has(bdm.ebs.encrypted) && bdm.ebs.encrypted == true)
                                    )
                                  message: 'All EBS volumes must have encryption enabled (encrypted: true).'
                                - expression: |
                                    !has(object.spec.tags) ||
                                    object.spec.tags.all(key,
                                      key != 'red-hat-managed' &&
                                      !key.startsWith('api.openshift.com/') &&
                                      !key.startsWith('kubernetes.io/cluster/')
                                    )
                                  message: Tags 'red-hat-managed', 'api.openshift.com/*', and 'kubernetes.io/cluster/*' are reserved and cannot be set.
                                - expression: |
                                    !has(object.spec.associatePublicIPAddress) ||
                                    object.spec.associatePublicIPAddress != true
                                  message: Public IP address association is not allowed. Set associatePublicIPAddress to false or remove it.
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: admissionregistration.k8s.io/v1
                        kind: ValidatingAdmissionPolicyBinding
                        metadata:
                            name: autonode-ec2nodeclass-guardrails-binding
                        spec:
                            policyName: autonode-ec2nodeclass-guardrails
                            validationActions:
                                - Deny
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: admissionregistration.k8s.io/v1
                        kind: ValidatingAdmissionPolicy
                        metadata:
                            name: autonode-nodeclaim-guardrails
                        spec:
                            failurePolicy: Fail
                            matchConstraints:
                                resourceRules:
                                    - apiGroups:
                                        - karpenter.sh
                                      apiVersions:
                                        - v1
                                      operations:
                                        - CREATE
                                        - UPDATE
                                      resources:
                                        - nodeclaims
                            validations:
                                - expression: |
                                    !has(object.spec.requirements) ||
                                    object.spec.requirements
                                      .filter(r, r.key == 'node.kubernetes.io/instance-type' && r.operator == 'In')
                                      .all(r, r.values.all(v,
                                        !v.matches('\\.(nano|micro|small|medium)$')
                                      ))
                                  message: Instance types ending in .nano, .micro, .small, or .medium are not supported for OpenShift nodes.
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: admissionregistration.k8s.io/v1
                        kind: ValidatingAdmissionPolicyBinding
                        metadata:
                            name: autonode-nodeclaim-guardrails-binding
                        spec:
                            policyName: autonode-nodeclaim-guardrails
                            validationActions:
                                - Deny
                pruneObjectBehavior: DeleteIfCreated
                remediationAction: enforce
                severity: low
    remediationAction: enforce
---
apiVersion: apps.open-cluster-management.io/v1
kind: PlacementRule
metadata:
    name: placement-srep-vap-autonode-karpenter
    namespace: openshift-acm-policies
spec:
    clusterSelector:
        matchExpressions:
            - key: hypershift.open-cluster-management.io/hosted-cluster
              operator: In
              values:
                - "true"
            - key: openshiftVersion-major-minor
              operator: NotIn
              values:
                - "4.14"
                - "4.15"
                - "4.16"
                - "4.17"
                - "4.18"
                - "4.19"
                - "4.20"
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
    name: binding-srep-vap-autonode-karpenter
    namespace: openshift-acm-policies
placementRef:
    apiGroup: apps.open-cluster-management.io
    kind: PlacementRule
    name: placement-srep-vap-autonode-karpenter
subjects:
    - apiGroup: policy.open-cluster-management.io
      kind: Policy
      name: srep-vap-autonode-karpenter
