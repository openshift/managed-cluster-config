---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
    annotations:
        policy.open-cluster-management.io/categories: CM Configuration Management
        policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
        policy.open-cluster-management.io/standards: NIST SP 800-53
    name: hcp-ze-ecr-creds
    namespace: openshift-acm-policies
spec:
    disabled: false
    policy-templates:
        - objectDefinition:
            apiVersion: policy.open-cluster-management.io/v1
            kind: ConfigurationPolicy
            metadata:
                name: hcp-ze-ecr-creds
            spec:
                evaluationInterval:
                    compliant: 2h
                    noncompliant: 45s
                object-templates-raw: |
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: v1
                        kind: ServiceAccount
                        metadata:
                          name: ecr-credential-refresh
                          namespace: kube-system
                          labels:
                            app: ecr-credential-refresh
                            app.kubernetes.io/name: ecr-credential-refresh
                            app.kubernetes.io/component: credential-management
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: rbac.authorization.k8s.io/v1
                        kind: Role
                        metadata:
                          name: ecr-credential-refresh
                          namespace: kube-system
                          labels:
                            app: ecr-credential-refresh
                        rules:
                          - apiGroups: [""]
                            resources: ["secrets"]
                            resourceNames: ["additional-pull-secret"]
                            verbs: ["get", "patch", "update"]
                          - apiGroups: [""]
                            resources: ["secrets"]
                            verbs: ["create"]
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: rbac.authorization.k8s.io/v1
                        kind: RoleBinding
                        metadata:
                          name: ecr-credential-refresh
                          namespace: kube-system
                          labels:
                            app: ecr-credential-refresh
                        subjects:
                          - kind: ServiceAccount
                            name: ecr-credential-refresh
                            namespace: kube-system
                        roleRef:
                          kind: Role
                          name: ecr-credential-refresh
                          apiGroup: rbac.authorization.k8s.io
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: rbac.authorization.k8s.io/v1
                        kind: ClusterRole
                        metadata:
                          name: ecr-credential-refresh
                          labels:
                            app: ecr-credential-refresh
                        rules:
                          - apiGroups: ["config.openshift.io"]
                            resources: ["imagedigestmirrorsets", "infrastructures"]
                            verbs: ["get", "list"]
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: rbac.authorization.k8s.io/v1
                        kind: ClusterRoleBinding
                        metadata:
                          name: ecr-credential-refresh
                          labels:
                            app: ecr-credential-refresh
                        subjects:
                          - kind: ServiceAccount
                            name: ecr-credential-refresh
                            namespace: kube-system
                        roleRef:
                          kind: ClusterRole
                          name: ecr-credential-refresh
                          apiGroup: rbac.authorization.k8s.io
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: v1
                        kind: ConfigMap
                        metadata:
                          name: ecr-credential-refresh-script
                          namespace: kube-system
                          labels:
                            app: ecr-credential-refresh
                        data:
                          refresh.py: |
                            #!/usr/bin/env python3
                            """ECR Credential Refresh Script for Zero-Egress HCP Clusters.

                            Gets an ECR authorization token using the node's ECR credential helper
                            and updates additional-pull-secret in kube-system namespace. HCCO then
                            merges this with original credentials to create global-pull-secret.

                            This script auto-detects zero-egress clusters by checking for IDMS.
                            Non-zero-egress clusters exit early with success (no-op).

                            Supports multiple ECR registries across all ImageDigestMirrorSets.

                            SOP: https://github.com/openshift/ops-sop/blob/master/hypershift/knowledge_base/zero-egress/zero-egress-ecr-credential-refresh.md
                            Tracking: OHSS-49424
                            """

                            import base64
                            import json
                            import os
                            import re
                            import subprocess
                            import sys
                            from datetime import datetime, timezone


                            SECRET_NAME = os.environ.get("SECRET_NAME", "additional-pull-secret")
                            NAMESPACE = os.environ.get("NAMESPACE", "kube-system")
                            HELPER_PATH = os.environ.get(
                                "HELPER_PATH",
                                "/host/usr/libexec/kubelet-image-credential-provider-plugins/ecr-credential-provider",
                            )

                            ECR_REGISTRY_RE = re.compile(
                                r"^(\d+\.dkr\.ecr\.[a-z0-9-]+\.amazonaws\.com)"
                            )


                            def log(msg):
                                ts = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S")
                                print(f"{ts} - {msg}", flush=True)


                            def run(args, check=True, capture=True, redact_args=False):
                                """Run a subprocess, returning CompletedProcess."""
                                result = subprocess.run(
                                    args,
                                    capture_output=capture,
                                    text=True,
                                    check=False,
                                )
                                if check and result.returncode != 0:
                                    stderr = result.stderr.strip() if result.stderr else ""
                                    cmd = " ".join(args[:5]) + " ..." if redact_args else " ".join(args)
                                    raise RuntimeError(
                                        f"Command failed (rc={result.returncode}): {cmd}\n{stderr}"
                                    )
                                return result


                            def discover_ecr_registries():
                                """Discover unique ECR registries from ImageDigestMirrorSets.

                                Returns a list of ECR registry hostnames, or an empty list if
                                no IDMS mirrors are found (not a zero-egress cluster).
                                """
                                log("Discovering ECR registries from cluster configuration...")

                                result = run(
                                    ["oc", "get", "imagedigestmirrorset", "-o",
                                     "jsonpath={.items[*].spec.imageDigestMirrors[*].mirrors[*]}"],
                                    check=False,
                                )
                                all_mirrors = result.stdout.strip()

                                if not all_mirrors:
                                    log("No IDMS mirrors found")
                                    return []

                                seen = set()
                                registries = []
                                for mirror in all_mirrors.split():
                                    match = ECR_REGISTRY_RE.match(mirror)
                                    if match:
                                        registry = match.group(1)
                                        if registry not in seen:
                                            seen.add(registry)
                                            registries.append(registry)
                                            log(f"Discovered ECR registry: {registry}")

                                if not registries:
                                    log("No ECR registries found in IDMS mirrors")

                                log(f"Found {len(registries)} unique ECR registry(s)")
                                return registries


                            def get_ecr_token(registry):
                                """Get ECR token using the credential helper.

                                ECR auth tokens are per-IAM-principal, not per-registry. A single
                                token works for all ECR registries the node's role can access.

                                Returns the ECR password string.
                                """
                                log("Getting ECR authorization token via credential helper...")

                                if not os.access(HELPER_PATH, os.X_OK):
                                    raise RuntimeError(
                                        f"ECR credential helper not found or not executable: {HELPER_PATH}"
                                    )

                                request = json.dumps({
                                    "kind": "CredentialProviderRequest",
                                    "apiVersion": "credentialprovider.kubelet.k8s.io/v1",
                                    "image": f"{registry}/test",
                                })

                                result = subprocess.run(
                                    [HELPER_PATH, "get-credentials"],
                                    input=request,
                                    capture_output=True,
                                    text=True,
                                    check=False,
                                )
                                if result.returncode != 0:
                                    raise RuntimeError(
                                        f"Failed to get credentials from helper: {result.stderr}"
                                    )

                                password = ""
                                try:
                                    response = json.loads(result.stdout)
                                    password = response.get("status", {}).get("auth", {}).get(
                                        f"{registry}/test", {}
                                    ).get("password", "")
                                except json.JSONDecodeError:
                                    pass

                                if not password:
                                    # Fall back to searching the raw response
                                    match = re.search(r'"password"\s*:\s*"([^"]*)"', result.stdout)
                                    if match:
                                        password = match.group(1)

                                if not password:
                                    raise RuntimeError(
                                        "Credential helper response did not contain a usable password"
                                    )

                                log("Successfully retrieved ECR authorization token")
                                return password


                            def update_secret(registries, ecr_password):
                                """Update additional-pull-secret with ECR credentials for all registries."""
                                log(f"Updating {SECRET_NAME} in {NAMESPACE} with {len(registries)} registry(s)...")

                                auth_token = base64.b64encode(f"AWS:{ecr_password}".encode()).decode()
                                ecr_auths = {
                                    registry: {"auth": auth_token, "email": ""}
                                    for registry in registries
                                }
                                ecr_dockerconfig = {"auths": ecr_auths}
                                config_b64 = base64.b64encode(
                                    json.dumps(ecr_dockerconfig).encode()
                                ).decode()

                                # Check if secret exists
                                result = run(
                                    ["oc", "get", "secret", SECRET_NAME, "-n", NAMESPACE],
                                    check=False,
                                )

                                if result.returncode == 0:
                                    # Secret exists — patch it
                                    patch_data = json.dumps({
                                        "data": {".dockerconfigjson": config_b64}
                                    })
                                    run([
                                        "oc", "patch", "secret", SECRET_NAME, "-n", NAMESPACE,
                                        "--type=merge", "-p", patch_data,
                                    ], redact_args=True)
                                    log(f"Successfully patched {SECRET_NAME}")
                                else:
                                    # Secret does not exist — create it
                                    secret_manifest = json.dumps({
                                        "apiVersion": "v1",
                                        "kind": "Secret",
                                        "metadata": {
                                            "name": SECRET_NAME,
                                            "namespace": NAMESPACE,
                                        },
                                        "type": "kubernetes.io/dockerconfigjson",
                                        "data": {
                                            ".dockerconfigjson": config_b64,
                                        },
                                    })

                                    result = subprocess.run(
                                        ["oc", "create", "-f", "-"],
                                        input=secret_manifest,
                                        capture_output=True,
                                        text=True,
                                        check=False,
                                    )
                                    if result.returncode != 0:
                                        raise RuntimeError(f"Failed to create secret: {result.stderr}")
                                    log(f"Successfully created {SECRET_NAME}")

                                for registry in registries:
                                    log(f"  - {registry}")


                            def main():
                                # Step 1: Discover all ECR registries from IDMS
                                registries = discover_ecr_registries()
                                if not registries:
                                    log("Skipping - no ECR IDMS mirrors found (not a zero-egress cluster)")
                                    return

                                log(f"Starting ECR credential refresh for {len(registries)} registry(s)")

                                # Step 2: Get ECR token (same token works for all registries)
                                ecr_password = get_ecr_token(registries[0])

                                # Step 3: Update the secret with auth entries for all registries
                                update_secret(registries, ecr_password)

                                log("ECR credential refresh completed successfully")


                            if __name__ == "__main__":
                                try:
                                    main()
                                except Exception as e:
                                    log(f"FATAL - {e}")
                                    sys.exit(1)
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: batch/v1
                        kind: CronJob
                        metadata:
                          name: ecr-credential-refresh
                          namespace: kube-system
                          labels:
                            app: ecr-credential-refresh
                        spec:
                          schedule: "0 */4 * * *"
                          concurrencyPolicy: Forbid
                          successfulJobsHistoryLimit: 3
                          failedJobsHistoryLimit: 3
                          jobTemplate:
                            spec:
                              backoffLimit: 3
                              activeDeadlineSeconds: 300
                              template:
                                metadata:
                                  labels:
                                    app: ecr-credential-refresh
                                spec:
                                  serviceAccountName: ecr-credential-refresh
                                  restartPolicy: OnFailure
                                  nodeSelector:
                                    node-role.kubernetes.io/worker: ""
                                  tolerations:
                                    - operator: Exists
                                  hostNetwork: true
                                  dnsPolicy: Default
                                  containers:
                                    - name: refresh
                                      # Dynamic lookup: get image from node-resolver DaemonSet
                                      # This image is guaranteed to be cached on worker nodes
                                      # Uses index function since ACM templates don't support bracket notation
                                      image: '{{ (index (lookup "apps/v1" "DaemonSet" "openshift-dns" "node-resolver").spec.template.spec.containers 0).image }}'
                                      imagePullPolicy: IfNotPresent
                                      command:
                                        - python3
                                        - /scripts/refresh.py
                                      volumeMounts:
                                        - name: script
                                          mountPath: /scripts
                                          readOnly: true
                                        - name: host-root
                                          mountPath: /host
                                          readOnly: true
                                      resources:
                                        requests:
                                          cpu: 10m
                                          memory: 64Mi
                                        limits:
                                          cpu: 100m
                                          memory: 128Mi
                                      securityContext:
                                        allowPrivilegeEscalation: false
                                        capabilities:
                                          drop:
                                            - ALL
                                        seccompProfile:
                                          type: RuntimeDefault
                                  volumes:
                                    - name: script
                                      configMap:
                                        name: ecr-credential-refresh-script
                                        defaultMode: 0755
                                    - name: host-root
                                      hostPath:
                                        path: /
                                        type: Directory
                    - complianceType: mustonlyhave
                      metadataComplianceType: musthave
                      objectDefinition:
                        apiVersion: batch/v1
                        kind: Job
                        metadata:
                          name: ecr-credential-refresh-initial
                          namespace: kube-system
                          labels:
                            app: ecr-credential-refresh
                            app.kubernetes.io/component: initial-refresh
                        spec:
                          activeDeadlineSeconds: 3600
                          ttlSecondsAfterFinished: 3600
                          template:
                            metadata:
                              labels:
                                app: ecr-credential-refresh
                            spec:
                              serviceAccountName: ecr-credential-refresh
                              restartPolicy: Never
                              nodeSelector:
                                node-role.kubernetes.io/worker: ""
                              tolerations:
                                - operator: Exists
                              hostNetwork: true
                              dnsPolicy: Default
                              containers:
                                - name: refresh
                                  # Dynamic lookup: get image from node-resolver DaemonSet
                                  # This image is guaranteed to be cached on worker nodes
                                  # Uses index function since ACM templates don't support bracket notation
                                  image: '{{ (index (lookup "apps/v1" "DaemonSet" "openshift-dns" "node-resolver").spec.template.spec.containers 0).image }}'
                                  imagePullPolicy: IfNotPresent
                                  command:
                                    - python3
                                    - /scripts/refresh.py
                                  volumeMounts:
                                    - name: script
                                      mountPath: /scripts
                                      readOnly: true
                                    - name: host-root
                                      mountPath: /host
                                      readOnly: true
                                  resources:
                                    requests:
                                      cpu: 10m
                                      memory: 64Mi
                                    limits:
                                      cpu: 100m
                                      memory: 128Mi
                                  securityContext:
                                    allowPrivilegeEscalation: false
                                    capabilities:
                                      drop:
                                        - ALL
                                    seccompProfile:
                                      type: RuntimeDefault
                              volumes:
                                - name: script
                                  configMap:
                                    name: ecr-credential-refresh-script
                                    defaultMode: 0755
                                - name: host-root
                                  hostPath:
                                    path: /
                                    type: Directory
                pruneObjectBehavior: DeleteIfCreated
                remediationAction: enforce
                severity: low
    remediationAction: enforce
---
apiVersion: apps.open-cluster-management.io/v1
kind: PlacementRule
metadata:
    name: placement-hcp-ze-ecr-creds
    namespace: openshift-acm-policies
spec:
    clusterSelector:
        matchExpressions:
            - key: hypershift.open-cluster-management.io/hosted-cluster
              operator: In
              values:
                - "true"
            - key: api.openshift.com/hosted-cluster-egress-policy
              operator: In
              values:
                - NoEgress
            - key: openshiftVersion-major-minor
              operator: NotIn
              values:
                - "4.14"
                - "4.15"
                - "4.16"
                - "4.17"
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
    name: binding-hcp-ze-ecr-creds
    namespace: openshift-acm-policies
placementRef:
    apiGroup: apps.open-cluster-management.io
    kind: PlacementRule
    name: placement-hcp-ze-ecr-creds
subjects:
    - apiGroup: policy.open-cluster-management.io
      kind: Policy
      name: hcp-ze-ecr-creds
