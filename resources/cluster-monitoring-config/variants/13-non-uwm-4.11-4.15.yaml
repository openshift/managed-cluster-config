# Non-UWM clusters on 4.11-4.15
deployDir: cluster-monitoring-config-non-uwm/4.11-4.15
category: non-uwm

selector:
  deploymentMode: "SelectorSyncSet"
  selectorSyncSet:
    matchExpressions:
      - key: hive.openshift.io/version-major-minor
        operator: In
        values: ["4.11", "4.12", "4.13", "4.14", "4.15"]
      - key: ext-managed.openshift.io/uwm-disabled
        operator: In
        values: ["true"]
      - key: ext-hypershift.openshift.io/cluster-type
        operator: NotIn
        values: ["management-cluster"]

configOverrides:
  enableUserWorkload: false
  prometheusK8s:
    retention: 7d
copyKeys:
  grafana: prometheusOperator
