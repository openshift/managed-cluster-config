# Non-UWM clusters on 4.6-4.10
deployDir: cluster-monitoring-config-non-uwm/pre-4.11
category: non-uwm

selector:
  deploymentMode: "SelectorSyncSet"
  selectorSyncSet:
    matchExpressions:
      - key: hive.openshift.io/version-major-minor
        operator: In
        values: ["4.6", "4.7", "4.8", "4.9", "4.10"]
      - key: ext-managed.openshift.io/uwm-disabled
        operator: In
        values: ["true"]
      - key: ext-hypershift.openshift.io/cluster-type
        operator: NotIn
        values: ["management-cluster"]

configOverrides:
  enableUserWorkload: false
  prometheusK8s:
    retention: 7d
copyKeys:
  grafana: prometheusOperator
