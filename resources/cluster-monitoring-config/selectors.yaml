# Base selector definitions for each CMO config deployment target.
# These are used by generate-cmo-config.py to produce config.yaml files
# in each deploy subdirectory. Override exclusions (NotIn) are automatically
# appended by the script when overrides are defined.
#
# Each entry maps a deploy directory (relative to deploy/) to its base
# SelectorSyncSet matchExpressions.

cluster-monitoring-config:
  deploymentMode: "SelectorSyncSet"
  selectorSyncSet:
    matchExpressions:
      - key: hive.openshift.io/version-major-minor
        operator: NotIn
        values: ["4.5", "4.6", "4.7", "4.8", "4.9", "4.10", "4.11", "4.12", "4.13", "4.14", "4.15"]
      - key: ext-managed.openshift.io/uwm-disabled
        operator: NotIn
        values: ["true"]
      - key: api.openshift.com/fedramp
        operator: NotIn
        values: ["true"]
      - key: ext-hypershift.openshift.io/cluster-type
        operator: NotIn
        values: ["management-cluster"]

